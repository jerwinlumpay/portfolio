        .section-container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 40px 25px; }
        
        @media (min-width: 1024px) {
            .sidebar { display: flex; }
            .mobile-header { display: none; }
            .main-content { margin-left: 280px; width: calc(100% - 280px); padding-top: 0; }

        .nav-link { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: rgba(238, 229, 217, 0.6); transition: 0.3s; margin-bottom: 25px; display: block; text-decoration: none; }

        .btn-contact:hover { background-color: var(--champagne); color: var(--onyx); transform: translateY(-2px); }

        .gold-text { color: var(--champagne); }
        .velvet-text { color: var(--velvet); }
        
        /* High-End Glass Competency Box */

            border: 1px solid rgba(0, 0, 0, 0.05); 
            border-left: 3px solid var(--champagne); 
            padding: 30px; transition: 0.3s; height: 100%;

        }
        .competency-box:hover { background: rgba(255, 255, 255, 0.9); border-color: var(--champagne); box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
