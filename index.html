<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive/Virtual Assistant, Office operation & Administration & Customer Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/p22-underground" rel="stylesheet">
    <style>
        :root { --onyx: #0D0D0F; --champagne: #D8B24A; --ivory: #FFF4DE; }
        body { background-color: var(--onyx); color: var(--ivory); font-family: 'P22 Underground', sans-serif; }
        .gold-text { color: var(--champagne); }
        .btn-luxury {
            background: linear-gradient(135deg, #D8B24A 0%, #B8860B 100%);
            color: #000; padding: 14px 30px; border-radius: 50px;
            font-weight: 800; text-transform: uppercase; font-size: 10px;
            display: inline-flex; align-items: center; gap: 10px; transition: 0.3s;
        }
        .btn-luxury:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(216, 178, 74, 0.2); }
        nav.scrolled { background-color: rgba(13, 13, 15, 0.98); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(216, 178, 74, 0.2); }
    </style>
</head>
<body>
    <nav id="navbar" class="fixed top-0 left-0 w-full z-50 px-8 py-8 transition-all">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="text-xl font-black uppercase tracking-widest">J.LUMPAY<span class="gold-text">.</span></span>
            <div class="hidden md:flex gap-8">
                <a href="index.html" class="text-[10px] font-bold uppercase gold-text">Home</a>
                <a href="services.html" class="text-[10px] font-bold uppercase hover:text-[#D8B24A]">Services</a>
                <a href="portfolio.html" class="text-[10px] font-bold uppercase hover:text-[#D8B24A]">Portfolio</a>
            </div>
            <a href="https://wa.me/971544609927" class="btn-luxury">WhatsApp</a>
        </div>
    </nav>

    <section class="min-h-screen flex items-center pt-20 px-6 lg:px-20">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-16 items-center">
            <div class="lg:col-span-5">
                <img src="jerwindp.jpg" alt="Jerwin Lumpay" class="rounded-2xl w-full border border-white/10 shadow-2xl">
            </div>
            <div class="lg:col-span-7 space-y-8">
                <h2 class="text-[#D8B24A] text-[11px] font-extrabold uppercase tracking-[0.5em]">Executive & Operations Specialist</h2>
                <h1 class="text-6xl md:text-8xl font-black italic uppercase leading-none">Operational <br><span class="gold-text">Excellence.</span></h1>
                <p class="text-xl text-slate-400 font-light max-w-2xl">Over 10 years of multi-disciplinary experience in Office Administration, US Compliance (ADP), and High-Performance Leadership[cite: 4, 17].</p>
                <div class="flex gap-4">
                    <a href="portfolio.html" class="btn-luxury">View Portfolio</a>
                    <a href="services.html" class="border border-[#D8B24A] text-[#D8B24A] px-8 py-4 rounded-full text-[10px] font-bold uppercase">Our Services</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });
    </script>
</body>
</html>
