<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Jerwin Lumpay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/p22-underground" rel="stylesheet">
    <style>
        :root { 
            --onyx: #000000; 
            --champagne: #DEB58A; 
            --silk: #EEE5D9; 
            --velvet: #2D3D62;
            --whatsapp: #25D366; 
            --linkedin: #0077B5;
            --location-red: #FF4B2B;
        }
        
        body { background-color: var(--silk); color: var(--velvet); font-family: 'P22 Underground', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* LOGO TINTING - CHAMPAGNE FILTER */
        .logo-style { 
            width: 160px; height: auto; transition: 0.3s; 
            filter: brightness(0) saturate(100%) invert(82%) sepia(13%) saturate(1185%) hue-rotate(349deg) brightness(93%) contrast(89%); 
        }
        .logo-style:hover { filter: brightness(0) saturate(100%) invert(100%); }

        /* NAVIGATION ARCHITECTURE */
        .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--onyx); border-right: 1px solid rgba(222, 181, 138, 0.05); display: none; flex-direction: column; padding: 40px; z-index: 100; }
        .mobile-header { display: flex; position: fixed; top: 0; width: 100%; height: 70px; background: var(--onyx); border-bottom: 1px solid rgba(222, 181, 138, 0.1); align-items: center; justify-content: space-between; padding: 0 25px; z-index: 110; }
        
        .main-content { width: 100%; min-height: 100vh; display: flex; flex-direction: column; padding-top: 70px; }
        .section-container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 40px 25px; }
        
        @media (min-width: 1024px) {
            .sidebar { display: flex; }
            .mobile-header { display: none; }
            .main-content { margin-left: 280px; width: calc(100% - 280px); padding-top: 0; }
            .section-container { padding: 80px 60px; }
        }

        /* ENHANCED NAVIGATION */
        .nav-link { 
            font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; 
            color: rgba(238, 229, 217, 0.3); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            margin-bottom: 30px; display: block; text-decoration: none; 
        }
        .nav-link:hover, .nav-link.active { 
            color: var(--champagne); text-shadow: 0 0 15px rgba(222, 181, 138, 0.4); transform: translateX(10px); 
        }
        
        /* SIDEBAR CONTACT BUTTONS */
        .btn-contact { 
            background-color: var(--silk); color: var(--onyx); padding: 14px; border-radius: 50px; 
            font-weight: 900; text-transform: uppercase; font-size: 11px; display: inline-flex; 
            align-items: center; justify-content: center; gap: 10px; text-decoration: none; 
            transition: 0.3s; width: 100%; letter-spacing: 1px; 
        }
        .btn-contact:hover { background-color: var(--champagne); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(222, 181, 138, 0.2); }

        /* CONTACT CARDS */
        .contact-item { 
            display: flex; align-items: center; gap: 20px; padding: 35px; 
            background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(0, 0, 0, 0.05); 
            border-radius: 28px; transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
            text-decoration: none; color: inherit; backdrop-filter: blur(10px);
        }
        .contact-item:hover { 
            background: #FFFFFF;
            border-color: var(--champagne);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        /* ICON BOXES */
        .icon-box { 
            width: 60px; height: 60px; border-radius: 18px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.4rem; flex-shrink: 0;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }
        
        .ic-location { background: rgba(255, 75, 43, 0.1); color: var(--location-red); }
        .ic-mail { background: rgba(222, 181, 138, 0.15); color: var(--champagne); }
        .ic-whatsapp { background: rgba(37, 211, 102, 0.1); color: var(--whatsapp); }
        .ic-linkedin { background: rgba(0, 119, 181, 0.1); color: var(--linkedin); }

        .label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: var(--velvet); opacity: 0.4; display: block; margin-bottom: 4px; }
        .detail { font-size: 1.15rem; font-weight: 800; color: var(--velvet); letter-spacing: -0.5px; }

        /* Mobile Menu */
        #mobile-menu { position: fixed; top: 0; left: -100%; width: 85%; height: 100vh; background: var(--onyx); z-index: 120; transition: 0.4s; padding: 40px; }
        #mobile-menu.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 115; display: none; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="mb-20">
            <a href="index.html"><img src="logo1.png" alt="Jerwin Lumpay" class="logo-style"></a>
        </div>
        <nav>
            <a href="index.html" class="nav-link">Home</a>
            <a href="portfolio.html" class="nav-link">Portfolio</a>
            <a href="skills.html" class="nav-link">Skills</a>
            <a href="services.html" class="nav-link">Services</a>
            <a href="achievements.html" class="nav-link">Achievements</a>
            <a href="feedback.html" class="nav-link">Feedback</a>
            <a href="contact.html" class="nav-link active">Contact</a>
        </nav>
        <div class="mt-auto space-y-4">
            <a href="https://linkedin.com/in/jerwin-lumpay" target="_blank" class="btn-contact">
                <i class="fab fa-linkedin-in"></i> LINKEDIN
            </a>
            <a href="https://wa.me/971544609927" class="btn-contact">
                <i class="fab fa-whatsapp"></i> WHATSAPP
            </a>
        </div>
    </aside>

    <div class="mobile-header">
        <a href="index.html"><img src="logo1.png" alt="Jerwin" class="logo-style" style="width: 80px;"></a>
        <button onclick="toggleMenu()" class="text-white text-2xl"><i class="fas fa-bars"></i></button>
    </div>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    <div id="mobile-menu">
        <div class="flex justify-between items-center mb-12">
             <span class="text-white font-black italic tracking-widest">MENU</span>
             <button onclick="toggleMenu()" class="text-white text-2xl"><i class="fas fa-times"></i></button>
        </div>
        <nav>
            <a href="index.html" class="nav-link">Home</a>
            <a href="portfolio.html" class="nav-link">Portfolio</a>
            <a href="skills.html" class="nav-link">Skills</a>
            <a href="services.html" class="nav-link">Services</a>
            <a href="achievements.html" class="nav-link">Achievements</a>
            <a href="feedback.html" class="nav-link">Feedback</a>
            <a href="contact.html" class="nav-link active">Contact</a>
        </nav>
    </div>

    <main class="main-content">
        <div class="section-container">
            <header class="mb-12 lg:mb-16">
                <h2 class="text-[--onyx] opacity-40 text-[10px] md:text-[12px] font-black uppercase tracking-[0.5em] mb-4">Direct Communication</h2>
                <h1 class="text-6xl md:text-8xl font-black italic uppercase leading-none tracking-tighter text-[--velvet]">Get In <br><span class="text-[--champagne]">Touch.</span></h1>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8 max-w-5xl">
                <div class="contact-item">
                    <div class="icon-box ic-location"><i class="fas fa-map-marker-alt"></i></div>
                    <div>
                        <span class="label">Location</span>
                        <p class="detail">Dubai, UAE</p>
                    </div>
                </div>

                <a href="mailto:support@jerwinlumpay.com" class="contact-item">
                    <div class="icon-box ic-mail"><i class="fas fa-envelope"></i></div>
                    <div>
                        <span class="label">Email Me</span>
                        <p class="detail">support@jerwinlumpay.com</p>
                    </div>
                </a>

                <a href="https://wa.me/971544609927" class="contact-item">
                    <div class="icon-box ic-whatsapp"><i class="fab fa-whatsapp"></i></div>
                    <div>
                        <span class="label">WhatsApp & Call</span>
                        <p class="detail">+971 54 460 9927</p>
                    </div>
                </a>

                <a href="https://linkedin.com/in/jerwin-lumpay" target="_blank" class="contact-item">
                    <div class="icon-box ic-linkedin"><i class="fab fa-linkedin-in"></i></div>
                    <div>
                        <span class="label">LinkedIn</span>
                        <p class="detail">jerwin-lumpay</p>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
