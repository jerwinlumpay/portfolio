<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Jerwin Lumpay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/p22-underground" rel="stylesheet">
    <style>
        :root { 
            --onyx: #0D0D0F; 
            --champagne: #D8B24A; 
            --ivory: #FFF4DE; 
            --whatsapp: #25D366; 
            --linkedin: #0077B5;
            --location-red: #FF4B2B;
        }
        
        body { background-color: var(--onyx); color: var(--ivory); font-family: 'P22 Underground', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* LOGO STYLE */
        .logo-style { 
            width: 160px; height: auto; transition: 0.3s;
            filter: brightness(0) saturate(100%) invert(84%) sepia(26%) saturate(1048%) hue-rotate(3deg) brightness(91%) contrast(85%);
        }
        .logo-style:hover { filter: brightness(0) saturate(100%) invert(100%); opacity: 1; }

        /* NAVIGATION ARCHITECTURE */
        .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; background: #08080A; border-right: 1px solid rgba(216, 178, 74, 0.1); display: none; flex-direction: column; padding: 40px; z-index: 100; }
        .mobile-header { display: flex; position: fixed; top: 0; width: 100%; height: 70px; background: #08080A; border-bottom: 1px solid rgba(216, 178, 74, 0.1); align-items: center; justify-content: space-between; padding: 0 25px; z-index: 110; }
        .main-content { width: 100%; min-height: 100vh; display: flex; flex-direction: column; padding-top: 70px; }
        .section-container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 40px 25px; }
        
        @media (min-width: 1024px) {
            .sidebar { display: flex; }
            .mobile-header { display: none; }
            .main-content { margin-left: 280px; width: calc(100% - 280px); padding-top: 0; }
            .section-container { padding: 80px 60px; }
        }

        .nav-link { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #666; transition: 0.3s; margin-bottom: 25px; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { color: var(--champagne); }
        
        .btn-contact { color: white; padding: 12px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 10px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; transition: 0.3s; width: 100%; }
        .btn-whatsapp { background-color: var(--whatsapp); }
        .btn-linkedin { background-color: var(--linkedin); }

        /* STABLE CONTACT CARDS */
        .contact-item { 
            display: flex; align-items: center; gap: 20px; padding: 30px; 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px; transition: 0.3s ease; 
            text-decoration: none; color: inherit; 
        }
        .contact-item:hover { 
            background: rgba(255,255,255,0.06);
            border-color: rgba(216, 178, 74, 0.2);
            transform: translateY(-5px);
        }

        /* PERMANENT SOFT COLORED ICON BOXES */
        .icon-box { 
            width: 54px; height: 54px; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.3rem;
        }
        
        /* Stable, Non-Flickering Brand Colors */
        .ic-location { background: rgba(255, 75, 43, 0.15); color: var(--location-red); }
        .ic-mail { background: rgba(216, 178, 74, 0.15); color: var(--champagne); }
        .ic-whatsapp { background: rgba(37, 211, 102, 0.15); color: var(--whatsapp); }
        .ic-linkedin { background: rgba(0, 119, 181, 0.15); color: var(--linkedin); }

        .label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: #777; display: block; margin-bottom: 4px; }
        .detail { font-size: 1.05rem; font-weight: 700; color: var(--ivory); }
        .gold-text { color: var(--champagne); }

        /* Mobile Menu */
        #mobile-menu { position: fixed; top: 0; left: -100%; width: 80%; height: 100vh; background: #08080A; z-index: 120; transition: 0.4s; padding: 40px; }
        #mobile-menu.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 115; display: none; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="mb-20">
            <a href="index.html"><img src="logo1.png" alt="Jerwin Lumpay" class="logo-style"></a>
        </div>
        <nav>
            <a href="index.html" class="nav-link">Home</a>
            <a href="portfolio.html" class="nav-link">Portfolio</a>
            <a href="skills.html" class="nav-link">Skills</a>
            <a href="services.html" class="nav-link">Services</a>
            <a href="achievements.html" class="nav-link">Achievements</a>
            <a href="feedback.html" class="nav-link">Feedback</a>
            <a href="contact.html" class="nav-link active">Contact</a>
        </nav>
        <div class="mt-auto space-y-3">
            <a href="https://linkedin.com/in/jerwin-lumpay" target="_blank" class="btn-contact btn-linkedin"><i class="fab fa-linkedin-in"></i> LinkedIn</a>
            <a href="https://wa.me/971544609927" class="btn-contact btn-whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
    </aside>

    <div class="mobile-header">
        <a href="index.html"><img src="logo1.png" alt="Jerwin" class="logo-style" style="width: 80px;"></a>
        <button onclick="toggleMenu()" class="text-white text-2xl"><i class="fas fa-bars"></i></button>
    </div>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    <div id="mobile-menu">
        <div class="flex justify-between items-center mb-12">
             <span class="text-white font-black italic">MENU</span>
             <button onclick="toggleMenu()" class="text-white text-2xl"><i class="fas fa-times"></i></button>
        </div>
        <nav class="space-y-6">
            <a href="index.html" class="nav-link">Home</a>
            <a href="portfolio.html" class="nav-link">Portfolio</a>
            <a href="skills.html" class="nav-link">Skills</a>
            <a href="services.html" class="nav-link">Services</a>
            <a href="achievements.html" class="nav-link">Achievements</a>
            <a href="feedback.html" class="nav-link">Feedback</a>
            <a href="contact.html" class="nav-link active">Contact</a>
        </nav>
    </div>

    <main class="main-content">
        <div class="section-container">
            <header class="mb-12 lg:mb-16">
                <h2 class="text-[#D8B24A] text-[10px] md:text-[12px] font-extrabold uppercase tracking-[0.5em] mb-4">Direct Communication</h2>
                <h1 class="text-6xl md:text-8xl font-black italic uppercase leading-none tracking-tighter">Get In <br><span class="gold-text">Touch.</span></h1>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8 max-w-5xl">
                <div class="contact-item">
                    <div class="icon-box ic-location"><i class="fas fa-map-marker-alt"></i></div>
                    <div>
                        <span class="label">Location</span>
                        <p class="detail">Dubai, UAE</p>
                    </div>
                </div>

                <a href="mailto:support@jerwinlumpay.com" class="contact-item">
                    <div class="icon-box ic-mail"><i class="fas fa-envelope"></i></div>
                    <div>
                        <span class="label">Email Me</span>
                        <p class="detail">support@jerwinlumpay.com</p>
                    </div>
                </a>

                <a href="https://wa.me/971544609927" class="contact-item">
                    <div class="icon-box ic-whatsapp"><i class="fab fa-whatsapp"></i></div>
                    <div>
                        <span class="label">WhatsApp & Call</span>
                        <p class="detail">+971 54 460 9927</p>
                    </div>
                </a>

                <a href="https://linkedin.com/in/jerwin-lumpay" target="_blank" class="contact-item">
                    <div class="icon-box ic-linkedin"><i class="fab fa-linkedin-in"></i></div>
                    <div>
                        <span class="label">LinkedIn</span>
                        <p class="detail">jerwin-lumpay</p>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
