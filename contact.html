    <style>
        :root { --onyx: #0D0D0F; --champagne: #D8B24A; --ivory: #FFF4DE; --whatsapp: #25D366; }
        body { background-color: var(--onyx); color: var(--ivory); font-family: 'P22 Underground', sans-serif; display: flex; margin: 0; }
        
        /* FIXED LEFT SIDEBAR */
        .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; background: #08080A; border-right: 1px solid rgba(216, 178, 74, 0.1); display: flex; flex-direction: column; padding: 40px; z-index: 100; }
        
        /* MAIN CONTENT AREA - Optimized for spacing */
        .main-content { margin-left: 280px; width: calc(100% - 280px); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        
        .section-container { max-width: 1200px; margin: 0 auto; width: 100%; padding: 80px 60px; }
        
        .nav-link { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #666; transition: 0.3s; margin-bottom: 25px; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { color: var(--champagne); }
        
        .btn-whatsapp { background-color: var(--whatsapp); color: white; padding: 12px; border-radius: 50px; font-weight: 800; text-transform: uppercase; font-size: 10px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-top: auto; text-decoration: none; }
        
        /* CONTACT INTERACTIVE ELEMENTS */
        .contact-item { display: flex; align-items: center; gap: 25px; padding: 35px; background: rgba(255,255,255,0.02); border: 1px solid rgba(216, 178, 74, 0.1); border-radius: 20px; transition: 0.4s; text-decoration: none; color: inherit; width: 100%; }
        .contact-item:hover { border-color: var(--champagne); background: rgba(216, 178, 74, 0.05); transform: translateX(15px); }
        .icon-box { width: 70px; height: 70px; border-radius: 50%; background: #08080A; border: 1px solid var(--champagne); display: flex; align-items: center; justify-content: center; color: var(--champagne); font-size: 1.4rem; flex-shrink: 0; }
        .label { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; color: #555; display: block; margin-bottom: 8px; }
        .detail { font-size: 1.4rem; font-weight: 700; color: var(--ivory); }
        
        .gold-text { color: var(--champagne); }
    </style>
</head>
